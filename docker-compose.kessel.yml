#
# Kessel stack for ros-ocp-backend contract/integration testing.
#
# Starts SpiceDB + Relations API + Inventory API backed by a shared PostgreSQL.
# Schema is loaded at Relations API startup via SPICEDB_SCHEMA_FILE.
# Tests seed tuples via Kessel Relations API (CreateTuples) -- no direct SpiceDB.
#
# PORT MAPPING:
#   PostgreSQL ........ 5433:5432
#   SpiceDB gRPC ...... 50052:50051
#   Relations API HTTP  8100:8000
#   Relations API gRPC  9000:9000
#   Inventory HTTP .... 8081:8000
#   Inventory gRPC .... 9081:9000
#
# Usage:
#   podman compose -f docker-compose.kessel.yml up -d
#   podman compose -f docker-compose.kessel.yml down -v

name: kessel-test

services:
  database:
    image: docker.io/library/postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: kessel
      POSTGRES_PASSWORD: kessel
      POSTGRES_DB: spicedb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kessel"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - kessel

  spicedb-migrate:
    image: docker.io/authzed/spicedb:latest
    command: migrate head
    restart: on-failure
    environment:
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: "postgres://kessel:kessel@database:5432/spicedb?sslmode=disable"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - kessel

  spicedb:
    image: docker.io/authzed/spicedb:latest
    command: serve
    restart: always
    ports:
      - "50052:50051"
    environment:
      SPICEDB_GRPC_PRESHARED_KEY: "testpresharedkey"
      SPICEDB_DATASTORE_ENGINE: postgres
      SPICEDB_DATASTORE_CONN_URI: "postgres://kessel:kessel@database:5432/spicedb?sslmode=disable"
      SPICEDB_HTTP_ENABLED: "true"
      SPICEDB_DATASTORE_REVISION_QUANTIZATION_INTERVAL: "0s"
    depends_on:
      spicedb-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - kessel

  relations-api:
    image: quay.io/cloudservices/kessel-relations:latest
    restart: always
    ports:
      - "8100:8000"
      - "9000:9000"
    environment:
      SPICEDB_PRESHARED: "testpresharedkey"
      SPICEDB_ENDPOINT: "spicedb:50051"
      SPICEDB_SCHEMA_FILE: /schema.zed
    volumes:
      - ./dev/schema/schema.zed:/schema.zed:ro,z
    depends_on:
      spicedb:
        condition: service_healthy
    networks:
      - kessel

  inventory-migrate:
    image: quay.io/cloudservices/kessel-inventory:latest
    command: ["migrate"]
    restart: on-failure
    environment:
      INVENTORY_API_CONFIG: /inventory-config.yaml
    volumes:
      - ./dev/kessel/inventory-config.yaml:/inventory-config.yaml:ro,z
    depends_on:
      database:
        condition: service_healthy
    networks:
      - kessel

  inventory-api:
    image: quay.io/cloudservices/kessel-inventory:latest
    command: ["serve"]
    restart: always
    ports:
      - "8081:8000"
      - "9081:9000"
    environment:
      INVENTORY_API_CONFIG: /inventory-config.yaml
    volumes:
      - ./dev/kessel/inventory-config.yaml:/inventory-config.yaml:ro,z
      - ./dev/kessel/resource-schemas:/resource-schemas:ro,z
    depends_on:
      inventory-migrate:
        condition: service_completed_successfully
      relations-api:
        condition: service_started
    networks:
      - kessel

networks:
  kessel:
    driver: bridge
